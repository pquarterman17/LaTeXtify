# REVTeX 4-2 (APS/AIP) — the worked example every other journal folder copies.
#
# To add a journal, clone this folder, edit these keys, and adjust the two
# .tex.j2 templates. The loader (latextify/templates/loader.py) validates every
# field below and names the offending field + journal on any error.

# \documentclass[<class_options>]{<class>}
class: revtex4-2
class_options: [aps, prb, reprint]   # aps society, Phys. Rev. B, two-column reprint

# \usepackage[options]{name}, emitted in order. REVTeX has natbib built in,
# so natbib is NOT listed here.
packages:
  - name: amsmath
  - name: amssymb
  - name: graphicx
  - name: bm
  - name: hyperref
    options: [colorlinks=true, linkcolor=blue, citecolor=blue, urlcolor=blue]
  # NOTE (plan item 5, 2026-07-11): do NOT add the standalone `doi` package
  # here. revtex4-2.cls already defines \doi itself; loading the CTAN `doi`
  # package on top throws "LaTeX Error: Command \doi already defined." and
  # aborts compilation -- verified by actually compiling this manifest's
  # rendered preamble through Tectonic (item 6 never exercised the full
  # manifest, only a hand-written minimal REVTeX doc). apsrev4-2.bst already
  # wraps the doi field in `\href{https://doi.org/...}{...}` natively (seen
  # directly in the generated .bbl), so hyperref alone is sufficient for
  # clickable DOIs -- no extra package needed.

# Bibliography. REVTeX/APS is numeric only — the author-year mode is omitted
# because apsrev4-2 forbids it (this is the "omit a mode" case for item 18).
bib:
  default_mode: numeric
  modes:
    numeric:
      bibstyle: apsrev4-2
      natbib_options: []   # REVTeX manages natbib internally via class options

# Informal name the emitter (plan item 5) maps to this journal's macro scheme.
metadata_scheme: revtex

# Float environments. `reprint` is two-column, so wide figures span with figure*.
figure_env:
  single: figure
  wide: figure*

# Class/style files to stage into the output tree when the Tectonic bundle
# lacks them. REVTeX ships in the bundle, so nothing to vendor (verified by
# plan item 6's smoke test).
vendor: []
